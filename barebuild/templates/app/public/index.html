<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>APP_NAME</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <style>
      body { font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 24px; line-height: 1.5; }
      nav { display: flex; gap: 12px; margin-bottom: 20px; }
      nav a {
        text-decoration: none; padding: 6px 12px; border-radius: 8px;
        border: 1px solid var(--x-color-border, rgba(0,0,0,.15)); color: inherit;
      }
      nav a:hover { background: rgba(0,0,0,.05); }
    </style>
    <!-- defer: shadow-cljs :init-fn runs after the markup below is parsed, so the
         read-side wiring can querySelector the router/route/data/table. -->
    <script defer src="/js/main.js"></script>
  </head>
  <body>
    <barebuild-router>
      <nav>
        <a href="/" data-barebuild-route>Home</a>
        <a href="/users" data-barebuild-route>Users</a>
      </nav>

      <barebuild-route path="/">
        <h1>Welcome to APP_NAME</h1>
        <p>Click <strong>Users</strong>: the route activates, fetches
           <code>/api/users.json</code> (a static stub), and renders it into an
           <code>&lt;x-table&gt;</code> — the canonical BareBuild read-side path.</p>
      </barebuild-route>

      <barebuild-route path="/users">
        <!-- No src in markup: the broker is dormant until its route activates;
             core.cljs sets src on activation (see read-side wiring). -->
        <barebuild-data></barebuild-data>
        <x-table columns="80px 2fr 1fr" bordered caption="Users"></x-table>
      </barebuild-route>
    </barebuild-router>
  </body>
</html>
