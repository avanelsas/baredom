<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>x-context-menu demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <style>
      :root {
        color-scheme: light dark;
        --page-bg: #f8fafc;
        --page-fg: #0f172a;
        --muted: #64748b;
        --border: #e2e8f0;
        --input-bg: #ffffff;
        --input-fg: #0f172a;
        --surface-bg: #ffffff;
        --surface-border: #e2e8f0;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --page-bg: #0f172a;
          --page-fg: #f8fafc;
          --muted: #94a3b8;
          --border: #1e293b;
          --input-bg: #1e293b;
          --input-fg: #f8fafc;
          --surface-bg: #1e293b;
          --surface-border: #334155;
        }
      }
      * { box-sizing: border-box; }
      html, body { min-height: 100%; margin: 0; background: var(--page-bg); color: var(--page-fg); }
      body { font-family: system-ui, -apple-system, sans-serif; padding: 24px; line-height: 1.4; }
      h2 { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin: 32px 0 10px; }
      .row { display: flex; gap: 24px; align-items: flex-start; flex-wrap: wrap; margin: 8px 0; }
      .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin: 12px 0; }
      .controls label { font-size: 13px; }
      .controls select, .controls input {
        font-size: 13px; padding: 4px 8px; border-radius: 6px;
        border: 1px solid var(--surface-border); background: var(--input-bg); color: var(--input-fg);
      }
      .menu-item {
        padding: 8px 16px; cursor: pointer; font-size: 14px; white-space: nowrap;
      }
      .menu-item:hover { background: rgba(0,0,0,0.06); }
      .menu-item.danger { color: #dc2626; }
      .log {
        margin-top: 24px; padding: 12px; border-radius: 8px;
        background: #111827; color: #f9fafb; min-height: 72px;
        white-space: pre-wrap; font-family: monospace; font-size: 12px;
      }
    </style>
    <script src="../js/main.js"></script>
  </head>
  <body>
    <h1>x-context-menu demo</h1>

    <h2>Basic (bottom-start)</h2>
    <div class="row">
      <x-context-menu id="menu-basic">
        <div class="menu-item" role="menuitem">Edit</div>
        <div class="menu-item" role="menuitem">Duplicate</div>
        <div class="menu-item danger" role="menuitem">Delete</div>
      </x-context-menu>
    </div>

    <h2>Placement variants</h2>
    <div class="row">
      <x-context-menu placement="bottom-start">
        <div class="menu-item" role="menuitem">bottom-start</div>
        <div class="menu-item" role="menuitem">Option 2</div>
      </x-context-menu>
      <x-context-menu placement="bottom-end">
        <div class="menu-item" role="menuitem">bottom-end</div>
        <div class="menu-item" role="menuitem">Option 2</div>
      </x-context-menu>
      <x-context-menu placement="top-start">
        <div class="menu-item" role="menuitem">top-start</div>
        <div class="menu-item" role="menuitem">Option 2</div>
      </x-context-menu>
      <x-context-menu placement="right-start">
        <div class="menu-item" role="menuitem">right-start</div>
        <div class="menu-item" role="menuitem">Option 2</div>
      </x-context-menu>
    </div>

    <h2>Disabled</h2>
    <div class="row">
      <x-context-menu disabled>
        <div class="menu-item" role="menuitem">Edit</div>
        <div class="menu-item" role="menuitem">Delete</div>
      </x-context-menu>
    </div>

    <h2>Live controls</h2>
    <div class="controls">
      <label>placement
        <select id="ctrl-placement">
          <option value="bottom-start" selected>bottom-start</option>
          <option value="bottom-end">bottom-end</option>
          <option value="top-start">top-start</option>
          <option value="top-end">top-end</option>
          <option value="right-start">right-start</option>
          <option value="left-start">left-start</option>
        </select>
      </label>
      <label>offset
        <input type="number" id="ctrl-offset" value="8" style="width:60px" min="0">
      </label>
      <label>disabled <input type="checkbox" id="ctrl-disabled"></label>
    </div>
    <div class="row">
      <x-context-menu id="menu-live">
        <div class="menu-item" role="menuitem">Edit</div>
        <div class="menu-item" role="menuitem">Duplicate</div>
        <div class="menu-item" role="menuitem">Move to…</div>
        <div class="menu-item danger" role="menuitem">Delete</div>
      </x-context-menu>
    </div>

    <div class="log" id="log">Event log will appear here.</div>

    <script>
      const log = document.getElementById("log");
      function logEvent(id, name, detail) {
        log.textContent = `${id}:${name}  ${JSON.stringify(detail)}\n` + log.textContent;
      }

      ["menu-basic", "menu-live"].forEach(id => {
        const menu = document.getElementById(id);
        ["x-context-menu-open", "x-context-menu-close", "x-context-menu-select"].forEach(evt => {
          menu.addEventListener(evt, e => logEvent(id, evt, e.detail || {}));
        });
      });

      document.querySelectorAll("[placement]").forEach(menu => {
        ["x-context-menu-open", "x-context-menu-close"].forEach(evt =>
          menu.addEventListener(evt, e => logEvent(menu.getAttribute("placement"), evt, {})));
      });

      const liveMen = document.getElementById("menu-live");
      function updateLive() {
        liveMen.setAttribute("placement", document.getElementById("ctrl-placement").value);
        liveMen.setAttribute("offset",    document.getElementById("ctrl-offset").value);
        if (document.getElementById("ctrl-disabled").checked)
          liveMen.setAttribute("disabled", "");
        else liveMen.removeAttribute("disabled");
      }
      document.querySelectorAll(".controls select, .controls input").forEach(el => {
        el.addEventListener("change", updateLive);
        el.addEventListener("input", updateLive);
      });
    </script>
  </body>
</html>
