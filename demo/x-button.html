<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>x-button demo</title>
    <meta name="color-scheme" content="light dark" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="../js/main.js"></script>
    <script src="demo-theme.js" defer></script>
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      body {
        font-family: system-ui, sans-serif;
        margin: 24px;
        line-height: 1.4;
        background: var(--page-bg);
        color: var(--page-fg);
      }

      

      .grid {
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      }

      .card {
        border: 1px solid var(--surface-border);
        border-radius: 12px;
        padding: 16px;
        background: var(--surface-bg);
      }

      

      .row {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
      }

      .log {
        margin-top: 24px;
        padding: 12px;
        border-radius: 8px;
        background: var(--surface-bg);
        border: 1px solid var(--surface-border);
        color: var(--page-fg);
        min-height: 72px;
        white-space: pre-wrap;
        font-family: monospace;
        font-size: 0.8rem;
      }

      

      x-button.brand {
        --x-button-bg: #2563eb;
        --x-button-bg-hover: #1d4ed8;
        --x-button-bg-active: #1e40af;
        --x-button-focus-ring: #93c5fd;
      }

      .spinner-dot {
        width: 0.75em;
        height: 0.75em;
        border-radius: 999px;
        background: currentColor;
        opacity: 0.75;
      }

      .icon {
        width: 1em;
        height: 1em;
        display: inline-block;
        border-radius: 999px;
        background: currentColor;
        opacity: 0.75;
      }
    </style>
  <link rel="stylesheet" href="demo-responsive.css" />
  </head>
  <body>
    <x-typography variant="h1">x-button demo</x-typography>

    <div class="grid">
      <section class="card">
        <x-typography variant="overline">Variants</x-typography>
        <div class="row">
          <x-button id="primary">Primary</x-button>
          <x-button variant="secondary">Secondary</x-button>
          <x-button variant="tertiary">Tertiary</x-button>
          <x-button variant="ghost">Ghost</x-button>
          <x-button variant="danger">Danger</x-button>
        </div>
      </section>

      <section class="card">
        <x-typography variant="overline">Sizes</x-typography>
        <div class="row">
          <x-button size="sm">Small</x-button>
          <x-button size="md">Medium</x-button>
          <x-button size="lg">Large</x-button>
        </div>
      </section>

      <section class="card">
        <x-typography variant="overline">States</x-typography>
        <div class="row">
          <x-button pressed>Pressed</x-button>
          <x-button disabled>Disabled</x-button>
          <x-button loading label="Saving">
            Saving
            <span slot="spinner" class="spinner-dot" aria-hidden="true"></span>
          </x-button>
        </div>
      </section>

      <section class="card">
        <x-typography variant="overline">Slots</x-typography>
        <div class="row">
          <x-button class="brand">
            <span slot="icon-start" class="icon" aria-hidden="true"></span>
            Save
          </x-button>

          <x-button label="Next">
            Next
            <span slot="icon-end" class="icon" aria-hidden="true"></span>
          </x-button>
        </div>
      </section>
    </div>

    <div class="log" id="log">Event log will appear here.</div>

    <script>
      const log = document.getElementById("log");
      const btn = document.getElementById("primary");

      [
        "press",
        "press-start",
        "press-end",
        "hover-start",
        "hover-end",
        "focus-visible"
      ].forEach((name) => {
        btn.addEventListener(name, (event) => {
          log.textContent =
            name + " " + JSON.stringify(event.detail ?? {}) + "\n" + log.textContent;
        });
      });
    </script>

  </body>
</html>
