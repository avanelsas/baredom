<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>x-form-field demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <style>
      * { box-sizing: border-box; }
      html, body { min-height: 100%; margin: 0; background: var(--page-bg); color: var(--page-fg); }
      body { font-family: system-ui, -apple-system, sans-serif; padding: 24px; line-height: 1.4; max-width: 640px; }
      h2 { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin: 32px 0 10px; }
      .stack { display: flex; flex-direction: column; gap: 16px; margin: 8px 0; }
      .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin: 12px 0; }
      .controls label { font-size: 13px; display: flex; align-items: center; gap: 4px; }
      .controls input[type=text] {
        font-size: 13px; padding: 4px 8px; border-radius: 6px;
        border: 1px solid var(--surface-border); background: var(--input-bg); color: var(--input-fg);
        width: 160px;
      }
      .log {
        margin-top: 24px; padding: 12px; border-radius: 8px;
        background: #111827; color: #f9fafb; min-height: 72px;
        white-space: pre-wrap; font-family: monospace; font-size: 12px;
      }
      x-form-field { display: block; }
    </style>
  <link rel="stylesheet" href="demo-responsive.css" />
    <script src="../js/main.js"></script>
    <script src="demo-theme.js" defer></script>
  </head>
  <body>
    <h1>x-form-field demo</h1>

    <x-typography variant="overline">Default (text)</x-typography>
    <div class="stack">
      <x-form-field label="Full name" placeholder="Jane Doe" name="fullname"></x-form-field>
    </div>

    <x-typography variant="overline">With hint</x-typography>
    <div class="stack">
      <x-form-field label="Email" type="email" placeholder="you@example.com" hint="We will never share your email." name="email"></x-form-field>
    </div>

    <x-typography variant="overline">With error</x-typography>
    <div class="stack">
      <x-form-field label="Username" value="foo" error="Username must be at least 4 characters." name="username"></x-form-field>
    </div>

    <x-typography variant="overline">With hint and error</x-typography>
    <div class="stack">
      <x-form-field label="Password" type="password" hint="At least 8 characters." error="Password is too short." name="password"></x-form-field>
    </div>

    <x-typography variant="overline">Disabled</x-typography>
    <div class="stack">
      <x-form-field label="Disabled field" value="Cannot edit this" disabled name="disabled-field"></x-form-field>
    </div>

    <x-typography variant="overline">Readonly</x-typography>
    <div class="stack">
      <x-form-field label="Read-only field" value="Read only value" readonly name="readonly-field"></x-form-field>
    </div>

    <x-typography variant="overline">Required</x-typography>
    <div class="stack">
      <x-form-field label="Required field" required placeholder="Must fill in" name="required-field"></x-form-field>
    </div>

    <x-typography variant="overline">Input types</x-typography>
    <div class="stack">
      <x-form-field label="Email"    type="email"    placeholder="you@example.com" name="t-email"></x-form-field>
      <x-form-field label="Password" type="password" placeholder="••••••••"        name="t-password"></x-form-field>
      <x-form-field label="URL"      type="url"      placeholder="https://…"       name="t-url"></x-form-field>
      <x-form-field label="Number"   type="number"   placeholder="42"              name="t-number"></x-form-field>
      <x-form-field label="Tel"      type="tel"      placeholder="+1 555 000 0000" name="t-tel"></x-form-field>
    </div>

    <x-typography variant="overline">No label</x-typography>
    <div class="stack">
      <x-form-field placeholder="No label visible" name="no-label"></x-form-field>
    </div>

    <x-typography variant="overline">Live controls</x-typography>
    <div class="controls">
      <label>label     <input type="text" id="ctrl-label" value="Email address"></label>
      <label>type
        <select id="ctrl-type" style="font-size:13px;padding:4px 6px;border-radius:6px;border:1px solid var(--surface-border);background:var(--input-bg);color:var(--input-fg);">
          <option value="text">text</option>
          <option value="email">email</option>
          <option value="password">password</option>
          <option value="url">url</option>
          <option value="number">number</option>
          <option value="tel">tel</option>
        </select>
      </label>
      <label>placeholder <input type="text" id="ctrl-placeholder" value="Enter value"></label>
      <label>hint        <input type="text" id="ctrl-hint" value=""></label>
      <label>error       <input type="text" id="ctrl-error" value=""></label>
      <label>disabled    <input type="checkbox" id="ctrl-disabled"></label>
      <label>readonly    <input type="checkbox" id="ctrl-readonly"></label>
      <label>required    <input type="checkbox" id="ctrl-required"></label>
    </div>
    <x-form-field id="live-field" label="Email address" placeholder="Enter value" name="live"></x-form-field>

    <x-typography variant="overline">In a &lt;form&gt; (submit to see FormData)</x-typography>
    <form id="demo-form" style="display:flex;flex-direction:column;gap:12px;margin:8px 0;">
      <x-form-field label="First name" name="first" placeholder="Jane"></x-form-field>
      <x-form-field label="Last name"  name="last"  placeholder="Doe"></x-form-field>
      <x-form-field label="Email"      name="email" type="email" placeholder="jane@example.com"></x-form-field>
      <button type="submit" style="align-self:flex-start;padding:8px 20px;border-radius:6px;border:none;background:#2563eb;color:#fff;font-size:14px;cursor:pointer;">Submit</button>
      <button type="reset"  style="align-self:flex-start;padding:8px 20px;border-radius:6px;border:none;background:#6b7280;color:#fff;font-size:14px;cursor:pointer;">Reset</button>
    </form>

    <div class="log" id="log">Event log will appear here.</div>

    <script>
      const log = document.getElementById("log");
      function logEvent(name, detail) {
        log.textContent = `${name}  ${JSON.stringify(detail)}\n` + log.textContent;
      }

      // live controls
      const liveField = document.getElementById("live-field");
      liveField.addEventListener("x-form-field-input",  e => logEvent("x-form-field-input",  e.detail));
      liveField.addEventListener("x-form-field-change", e => logEvent("x-form-field-change", e.detail));

      function updateLive() {
        const label       = document.getElementById("ctrl-label").value;
        const type        = document.getElementById("ctrl-type").value;
        const placeholder = document.getElementById("ctrl-placeholder").value;
        const hint        = document.getElementById("ctrl-hint").value;
        const error       = document.getElementById("ctrl-error").value;
        const disabled    = document.getElementById("ctrl-disabled").checked;
        const readonly    = document.getElementById("ctrl-readonly").checked;
        const required    = document.getElementById("ctrl-required").checked;

        liveField.setAttribute("label", label);
        liveField.setAttribute("type",  type);
        liveField.setAttribute("placeholder", placeholder);
        if (hint)  liveField.setAttribute("hint",  hint);  else liveField.removeAttribute("hint");
        if (error) liveField.setAttribute("error", error); else liveField.removeAttribute("error");
        if (disabled) liveField.setAttribute("disabled", ""); else liveField.removeAttribute("disabled");
        if (readonly) liveField.setAttribute("readonly", ""); else liveField.removeAttribute("readonly");
        if (required) liveField.setAttribute("required", ""); else liveField.removeAttribute("required");
      }

      document.querySelectorAll(".controls input, .controls select").forEach(el => {
        el.addEventListener("change", updateLive);
        el.addEventListener("input",  updateLive);
      });
      updateLive();

      // log events from all typed fields
      document.querySelectorAll("x-form-field:not(#live-field)").forEach(el => {
        el.addEventListener("x-form-field-input",  e => logEvent("x-form-field-input",  e.detail));
        el.addEventListener("x-form-field-change", e => logEvent("x-form-field-change", e.detail));
      });

      // form submit
      document.getElementById("demo-form").addEventListener("submit", e => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const data = Object.fromEntries(fd.entries());
        logEvent("form submit FormData", data);
      });
    </script>
  </body>
</html>
