<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>barebuild-data demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <style>
      * { box-sizing: border-box; }
      html, body { min-height: 100%; margin: 0; }
      body { font-family: system-ui, -apple-system, sans-serif; padding: 24px; line-height: 1.4; }
      h1 { font-size: 20px; }
      .row { display: flex; gap: 10px; margin: 14px 0; flex-wrap: wrap; }
      button {
        padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 14px;
        border: 1px solid var(--surface-border, rgba(0,0,0,.15)); background: transparent;
        color: var(--page-fg, #222);
      }
      button:hover { background: rgba(0,0,0,.05); }
      ul { padding-left: 18px; }
      .note { font-size: 13px; color: var(--page-fg, #555); }
      #log {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px; white-space: pre-wrap; margin-top: 16px;
        padding: 12px; border-radius: 8px; background: rgba(0,0,0,.04);
        max-height: 220px; overflow: auto;
      }
    </style>
    <link rel="stylesheet" href="demo-responsive.css" />
    <script src="../js/main.js"></script>
    <script src="demo-theme.js" defer></script>
  </head>
  <body>
    <h1>&lt;barebuild-data&gt;</h1>
    <p class="note">
      Fetches a URL and publishes the response as one value (<code>.state</code>),
      dispatching <code>barebuild-data-state</code> on every phase transition. This demo
      stubs <code>fetch</code> so it runs with no backend. The broker carries no
      <code>src</code> in markup — it is dormant until wiring sets it (activation-driven read).
    </p>

    <div class="row">
      <button id="load">Load /demo-api/users</button>
      <button id="refresh">Refresh (re-read)</button>
      <button id="fail">Load failing endpoint</button>
    </div>

    <barebuild-data id="data"></barebuild-data>
    <ul id="list"></ul>
    <div id="log"></div>

    <script>
      // ── Self-contained fetch stub (no server). Installed before any src is set. ──
      const realFetch = window.fetch.bind(window);
      window.fetch = (url, opts) => {
        const u = String(url);
        if (u.startsWith("/demo-api/")) {
          return new Promise((resolve) => setTimeout(() => {
            if (u.includes("fail")) {
              resolve(new Response("nope", { status: 500 }));
            } else {
              resolve(new Response(
                JSON.stringify([{ id: 1, name: "Ada" }, { id: 2, name: "Alan" }, { id: 3, name: "Grace" }]),
                { status: 200, headers: { "Content-Type": "application/json" } }));
            }
          }, 450));
        }
        return realFetch(url, opts);
      };

      const data = document.getElementById("data");
      const list = document.getElementById("list");
      const log  = document.getElementById("log");
      const line = (m) => { log.textContent = `${new Date().toLocaleTimeString()}  ${m}\n` + log.textContent; };

      // e.detail.state is a ClojureScript persistent map (V1 is CLJS-first; the
      // JS-view .stateJs is deferred). A *compiled CLJS* consumer reads it directly:
      //     (let [{:keys [phase data]} (.. e -detail -state)] ...)
      // This demo is plain HTML/JS, so it reaches the map via cljs.core interop.
      // The dev build exposes cljs.core globally; a real CLJS app never needs this.
      const core   = window.cljs && window.cljs.core;
      const getK   = (m, k) => core.get(m, core.keyword(k));
      const kwName = (v) => (v == null ? v : core.name(v)); // :loaded -> "loaded"

      // Read the delivered value from event.detail.state (event.target is identity only).
      data.addEventListener("barebuild-data-state", (e) => {
        const state  = e.detail.state;
        const phase  = kwName(getK(state, "phase"));
        const rows   = getK(state, "data");        // parsed JSON body (a JS array)
        const error  = getK(state, "error");
        const status = getK(state, "http-status");
        line(`state → phase=${phase}` +
             (status != null ? ` http=${status}` : "") +
             (error ? ` error=${JSON.stringify(error)}` : ""));
        if (phase === "loaded") {
          list.innerHTML = "";
          (rows || []).forEach((r) => {
            const li = document.createElement("li");
            li.textContent = `#${r.id} — ${r.name}`;
            list.appendChild(li);
          });
        }
        if (phase === "loading" || phase === "error") list.innerHTML = "";
      });

      // Setting .src triggers a fetch; re-setting (even same value) re-reads.
      document.getElementById("load").onclick    = () => { data.src = "/demo-api/users"; };
      document.getElementById("fail").onclick    = () => { data.src = "/demo-api/users?fail=1"; };
      // Manual refetch is event-driven — no method, no trigger attribute.
      document.getElementById("refresh").onclick = () =>
        data.dispatchEvent(new CustomEvent("barebuild-data-refresh"));
    </script>
  </body>
</html>
