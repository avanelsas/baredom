<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>x-avatar-group demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <style>
      * { box-sizing: border-box; }
      html, body { min-height: 100%; margin: 0; background: var(--page-bg); color: var(--page-fg); }
      body { font-family: system-ui, -apple-system, sans-serif; padding: 24px; line-height: 1.4; }
            .row { display: flex; gap: 24px; align-items: center; flex-wrap: wrap; margin: 12px 0; }
      .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin: 12px 0; }
      .controls label { font-size: 13px; }
      .controls select, .controls input {
        font-size: 13px; padding: 4px 8px; border-radius: 6px;
        border: 1px solid var(--surface-border); background: var(--input-bg); color: var(--input-fg);
      }
    </style>
  <link rel="stylesheet" href="demo-responsive.css" />
    <script src="../js/main.js"></script>
    <script src="demo-theme.js" defer></script>
  </head>
  <body>
    <x-typography variant="h1">x-avatar-group demo</x-typography>

    <x-typography variant="overline">Overlap variants</x-typography>
    <div class="row">
      <x-avatar-group overlap="none">
        <x-avatar name="Alice Bob"></x-avatar>
        <x-avatar name="Carol Dan"></x-avatar>
        <x-avatar name="Eve Fox"></x-avatar>
      </x-avatar-group>
      <x-avatar-group overlap="sm">
        <x-avatar name="Alice Bob"></x-avatar>
        <x-avatar name="Carol Dan"></x-avatar>
        <x-avatar name="Eve Fox"></x-avatar>
      </x-avatar-group>
      <x-avatar-group overlap="md">
        <x-avatar name="Alice Bob"></x-avatar>
        <x-avatar name="Carol Dan"></x-avatar>
        <x-avatar name="Eve Fox"></x-avatar>
      </x-avatar-group>
      <x-avatar-group overlap="lg">
        <x-avatar name="Alice Bob"></x-avatar>
        <x-avatar name="Carol Dan"></x-avatar>
        <x-avatar name="Eve Fox"></x-avatar>
      </x-avatar-group>
    </div>

    <x-typography variant="overline">Size variants</x-typography>
    <div class="row">
      <x-avatar-group size="xs" overlap="md">
        <x-avatar name="Alice Bob"></x-avatar>
        <x-avatar name="Carol Dan"></x-avatar>
        <x-avatar name="Eve Fox"></x-avatar>
      </x-avatar-group>
      <x-avatar-group size="sm" overlap="md">
        <x-avatar name="Alice Bob"></x-avatar>
        <x-avatar name="Carol Dan"></x-avatar>
        <x-avatar name="Eve Fox"></x-avatar>
      </x-avatar-group>
      <x-avatar-group size="md" overlap="md">
        <x-avatar name="Alice Bob"></x-avatar>
        <x-avatar name="Carol Dan"></x-avatar>
        <x-avatar name="Eve Fox"></x-avatar>
      </x-avatar-group>
      <x-avatar-group size="lg" overlap="md">
        <x-avatar name="Alice Bob"></x-avatar>
        <x-avatar name="Carol Dan"></x-avatar>
        <x-avatar name="Eve Fox"></x-avatar>
      </x-avatar-group>
      <x-avatar-group size="xl" overlap="md">
        <x-avatar name="Alice Bob"></x-avatar>
        <x-avatar name="Carol Dan"></x-avatar>
        <x-avatar name="Eve Fox"></x-avatar>
      </x-avatar-group>
    </div>

    <x-typography variant="overline">Overflow (max)</x-typography>
    <div class="row">
      <x-avatar-group max="2" label="Team (overflow example)">
        <x-avatar name="Alice Bob"></x-avatar>
        <x-avatar name="Carol Dan"></x-avatar>
        <x-avatar name="Eve Fox"></x-avatar>
        <x-avatar name="Greg Holt"></x-avatar>
      </x-avatar-group>
      <x-avatar-group size="lg" max="3">
        <x-avatar name="Alice Bob"></x-avatar>
        <x-avatar name="Carol Dan"></x-avatar>
        <x-avatar name="Eve Fox"></x-avatar>
        <x-avatar name="Greg Holt"></x-avatar>
        <x-avatar name="Ivan Jay"></x-avatar>
      </x-avatar-group>
    </div>

    <x-typography variant="overline">Disabled</x-typography>
    <div class="row">
      <x-avatar-group disabled>
        <x-avatar name="Alice Bob"></x-avatar>
        <x-avatar name="Carol Dan"></x-avatar>
        <x-avatar name="Eve Fox"></x-avatar>
      </x-avatar-group>
    </div>

    <x-typography variant="overline">Live controls</x-typography>
    <div class="controls">
      <label>size
        <x-select id="ctrl-size" value="md">
          <option value="xs">xs</option>
          <option value="sm">sm</option>
          <option value="md" selected>md</option>
          <option value="lg">lg</option>
          <option value="xl">xl</option>
        </x-select>
      </label>
      <label>overlap
        <x-select id="ctrl-overlap" value="md">
          <option value="none">none</option>
          <option value="sm">sm</option>
          <option value="md" selected>md</option>
          <option value="lg">lg</option>
        </x-select>
      </label>
      <label>max
        <x-form-field type="number" id="ctrl-max" placeholder="none" style="width:60px"></x-form-field>
      </label>
      <label>disabled
        <x-switch id="ctrl-disabled"></x-switch>
      </label>
    </div>
    <div style="margin-top:8px">
      <x-avatar-group id="live" overlap="md">
        <x-avatar name="Alice Bob"></x-avatar>
        <x-avatar name="Carol Dan"></x-avatar>
        <x-avatar name="Eve Fox"></x-avatar>
        <x-avatar name="Greg Holt"></x-avatar>
      </x-avatar-group>
    </div>

    <script>
      const live = document.getElementById("live");
      function update() {
        const size     = document.getElementById("ctrl-size").value;
        const overlap  = document.getElementById("ctrl-overlap").value;
        const maxVal   = document.getElementById("ctrl-max").value.trim();
        const disabled = document.getElementById("ctrl-disabled").checked;
        live.setAttribute("size", size);
        live.setAttribute("overlap", overlap);
        if (maxVal) live.setAttribute("max", maxVal); else live.removeAttribute("max");
        if (disabled) live.setAttribute("disabled", ""); else live.removeAttribute("disabled");
      }
      document.querySelectorAll(".controls select, .controls input, .controls x-switch, .controls x-select, .controls x-form-field").forEach(el => {
        el.addEventListener("change", update);
        el.addEventListener("input", update);
      });
    </script>
  </body>
</html>
