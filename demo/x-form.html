<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>x-form demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <style>
      :root {
        --btn-primary-bg: #2563eb;
        --btn-secondary-bg: #6b7280;
      }
      * { box-sizing: border-box; }
      
      body { font-family: system-ui, -apple-system, sans-serif; padding: 24px; line-height: 1.4; max-width: 640px; }
            .btn {
        padding: 8px 20px; border-radius: 6px; border: none;
        font-size: 14px; cursor: pointer; color: #fff;
      }
      .btn-primary  { background: var(--btn-primary-bg); }
      .btn-secondary { background: var(--btn-secondary-bg); }
      .btn[disabled], .btn[aria-disabled="true"] { opacity: 0.55; cursor: not-allowed; }
      .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin: 12px 0; }
      .controls label { font-size: 13px; display: flex; align-items: center; gap: 4px; }
      .log {
        margin-top: 24px; padding: 12px; border-radius: 8px;
        background: #111827; color: #f9fafb; min-height: 72px;
        white-space: pre-wrap; font-family: monospace; font-size: 12px;
      }
    </style>
  <link rel="stylesheet" href="demo-responsive.css" />
    <script src="../js/main.js"></script>
    <script src="demo-theme.js" defer></script>
  </head>
  <body>
    <x-typography variant="h1">x-form demo</x-typography>

    <!-- ------------------------------------------------------------------ -->
    <x-typography variant="overline">Login form — async submit simulation</x-typography>
    <p style="font-size:14px;color:var(--muted);margin:0 0 12px;">
      Submit sets <code>loading</code> for 1.5 s, then injects a server-side field error.
    </p>
    <x-form id="login-form">
      <x-form-field label="Email"    name="email"    type="email"    placeholder="you@example.com" required></x-form-field>
      <x-form-field label="Password" name="password" type="password" placeholder="••••••••"        required></x-form-field>
      <div style="display:flex;gap:8px;">
        <x-button id="login-submit" onclick="document.getElementById('login-form').submit()">Sign in</x-button>
        <x-button variant="secondary" onclick="document.getElementById('login-form').reset()">Reset</x-button>
      </div>
    </x-form>

    <!-- ------------------------------------------------------------------ -->
    <x-typography variant="overline">Contact form with reset</x-typography>
    <x-form id="contact-form">
      <x-form-field label="Name"    name="name"    placeholder="Jane Doe"           required></x-form-field>
      <x-form-field label="Email"   name="email"   type="email" placeholder="jane@example.com"></x-form-field>
      <x-form-field label="Message" name="message" placeholder="Your message here"></x-form-field>
      <x-checkbox name="subscribe" id="subscribe-check">Subscribe to newsletter</x-checkbox>
      <div style="display:flex;gap:8px;">
        <x-button onclick="document.getElementById('contact-form').submit()">Send</x-button>
        <x-button variant="secondary" onclick="document.getElementById('contact-form').reset()">Clear</x-button>
      </div>
    </x-form>

    <!-- ------------------------------------------------------------------ -->
    <x-typography variant="overline">Live controls</x-typography>
    <div class="controls">
      <label>loading      <x-switch id="ctrl-loading"></x-switch></label>
      <label>novalidate   <x-switch id="ctrl-novalidate"></x-switch></label>
      <label>autocomplete
        <x-select id="ctrl-autocomplete" style="font-size:13px;padding:4px 6px;border-radius:6px;border:1px solid var(--surface-border);background:var(--input-bg);color:var(--input-fg);" value="on">
          <option value="on">on</option>
          <option value="off">off</option>
        </x-select>
      </label>
      <x-button size="sm" id="ctrl-set-error">Inject email error</x-button>
      <x-button size="sm" variant="secondary" id="ctrl-clear-errors">Clear errors</x-button>
    </div>

    <!-- ------------------------------------------------------------------ -->
    <x-typography variant="overline">Event log</x-typography>
    <div class="log" id="log">Events will appear here.</div>

    <script>
      const log = document.getElementById('log');
      function logEvent(name, detail) {
        log.textContent = `${name}  ${JSON.stringify(detail)}\n` + log.textContent;
      }

      // --- Login form: async submit simulation ---
      const loginForm   = document.getElementById('login-form');
      const loginSubmit = document.getElementById('login-submit');

      loginForm.addEventListener('x-form-submit', e => {
        e.preventDefault(); // stop default (not required, but shows cancelability)
        const values = e.detail.values;
        logEvent('x-form-submit (login)', values);

        loginForm.setAttribute('loading', '');
        loginSubmit.textContent = 'Signing in…';

        setTimeout(() => {
          loginForm.removeAttribute('loading');
          loginSubmit.textContent = 'Sign in';
          // Simulate server-side error
          loginForm.setFieldError('email', 'No account found with this email.');
          logEvent('server error injected', {email: 'No account found with this email.'});
        }, 1500);
      });

      loginForm.addEventListener('x-form-reset', e => {
        loginForm.clearErrors();
        logEvent('x-form-reset (login)', {});
      });

      // --- Contact form ---
      const contactForm = document.getElementById('contact-form');

      contactForm.addEventListener('x-form-submit', e => {
        const values = e.detail.values;
        logEvent('x-form-submit (contact)', values);
      });

      contactForm.addEventListener('x-form-reset', () => {
        logEvent('x-form-reset (contact)', {});
      });

      // --- Live controls apply to contact form ---
      function updateLive() {
        const loading      = document.getElementById('ctrl-loading').checked;
        const novalidate   = document.getElementById('ctrl-novalidate').checked;
        const autocomplete = document.getElementById('ctrl-autocomplete').value;

        if (loading)    contactForm.setAttribute('loading', '');    else contactForm.removeAttribute('loading');
        if (novalidate) contactForm.setAttribute('novalidate', ''); else contactForm.removeAttribute('novalidate');
        contactForm.setAttribute('autocomplete', autocomplete);
      }

      document.querySelectorAll('.controls input, .controls select, .controls x-switch, .controls x-select').forEach(el => {
        el.addEventListener('change', updateLive);
      });

      document.getElementById('ctrl-set-error').addEventListener('click', () => {
        contactForm.setFieldError('email', 'This email is already in use.');
        logEvent('setFieldError', {email: 'This email is already in use.'});
      });

      document.getElementById('ctrl-clear-errors').addEventListener('click', () => {
        contactForm.clearErrors();
        logEvent('clearErrors', {});
      });

      updateLive();
    </script>
  </body>
</html>
