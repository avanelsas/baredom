<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>x-fieldset demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <style>
      * { box-sizing: border-box; }
      html, body { min-height: 100%; margin: 0; background: var(--page-bg); color: var(--page-fg); }
      body { font-family: system-ui, -apple-system, sans-serif; padding: 24px; line-height: 1.4; }
            .examples { display: flex; flex-direction: column; gap: 24px; max-width: 480px; }
      label { display: flex; flex-direction: column; gap: 4px; font-size: 14px; }
      label input[type=text], label input[type=email] {
        font-size: 14px; padding: 6px 10px; border-radius: 6px;
        border: 1px solid var(--surface-border); background: var(--input-bg); color: var(--input-fg);
      }
      .row { display: flex; gap: 8px; align-items: center; font-size: 14px; }
      .controls { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; margin: 12px 0; }
      .controls label { font-size: 13px; flex-direction: row; align-items: center; gap: 6px; }
      .controls input[type=text] {
        font-size: 13px; padding: 4px 8px; border-radius: 6px;
        border: 1px solid var(--surface-border); background: var(--input-bg); color: var(--input-fg);
        width: 180px;
      }
    </style>
  <link rel="stylesheet" href="demo-responsive.css" />
    <script src="../js/main.js"></script>
    <script src="demo-theme.js" defer></script>
  </head>
  <body>
    <x-typography variant="h1">x-fieldset demo</x-typography>

    <div class="examples">
      <x-typography variant="overline">Basic grouping</x-typography>
      <x-fieldset legend="Personal Information">
        <label>
          First name
          <x-form-field type="text" name="first-name" placeholder="Jane"></x-form-field>
        </label>
        <label>
          Last name
          <x-form-field type="text" name="last-name" placeholder="Doe"></x-form-field>
        </label>
        <label>
          Email
          <x-form-field type="email" name="email" placeholder="jane@example.com"></x-form-field>
        </label>
      </x-fieldset>

      <x-typography variant="overline">Disabled</x-typography>
      <x-fieldset legend="Payment Details" disabled>
        <label>
          Card number
          <x-form-field type="text" placeholder="•••• •••• •••• ••••"></x-form-field>
        </label>
        <label>
          Expiry
          <x-form-field type="text" placeholder="MM/YY"></x-form-field>
        </label>
      </x-fieldset>

      <x-typography variant="overline">No legend — aria-label only</x-typography>
      <x-fieldset aria-label="Shipping address">
        <label>
          Street
          <x-form-field type="text" placeholder="123 Main St"></x-form-field>
        </label>
        <label>
          City
          <x-form-field type="text" placeholder="Springfield"></x-form-field>
        </label>
      </x-fieldset>

      <x-typography variant="overline">With aria-describedby</x-typography>
      <p id="contact-desc" style="font-size:13px;color:var(--muted);margin:0 0 8px">
        We only use this information to confirm your identity.
      </p>
      <x-fieldset legend="Contact Details" aria-describedby="contact-desc">
        <label>
          Phone
          <x-form-field type="text" placeholder="+1 555-0100"></x-form-field>
        </label>
        <label>
          Email
          <x-form-field type="email" placeholder="you@example.com"></x-form-field>
        </label>
      </x-fieldset>

      <x-typography variant="overline">Custom legend text (checkboxes)</x-typography>
      <x-fieldset legend="Notification Preferences">
        <div class="row"><x-checkbox id="n1"></x-checkbox><label for="n1">Email updates</label></div>
        <div class="row"><x-checkbox id="n2"></x-checkbox><label for="n2">SMS alerts</label></div>
        <div class="row"><x-checkbox id="n3" checked></x-checkbox><label for="n3">Weekly digest</label></div>
      </x-fieldset>

      <x-typography variant="overline">Live controls</x-typography>
      <div class="controls">
        <label>
          legend
          <x-form-field type="text" id="ctrl-legend" value="Billing Address"></x-form-field>
        </label>
        <label>
          disabled
          <x-switch id="ctrl-disabled"></x-switch>
        </label>
      </div>
      <x-fieldset id="live-fs" legend="Billing Address">
        <label>
          Street
          <x-form-field type="text" placeholder="1 Infinite Loop"></x-form-field>
        </label>
        <label>
          Postcode
          <x-form-field type="text" placeholder="94025"></x-form-field>
        </label>
      </x-fieldset>
    </div>

    <script>
      const liveFs = document.getElementById("live-fs");

      function updateLive() {
        liveFs.legend   = document.getElementById("ctrl-legend").value;
        liveFs.disabled = document.getElementById("ctrl-disabled").checked;
      }

      document.querySelectorAll(".controls input, .controls x-switch, .controls x-form-field").forEach(el => {
        el.addEventListener("change", updateLive);
        el.addEventListener("input",  updateLive);
      });
    </script>
  </body>
</html>
