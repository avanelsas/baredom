<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>x-alert demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <style>
      * { box-sizing: border-box; }

      html, body {
        min-height: 100%;
        margin: 0;
      }

      body {
        font-family: system-ui, -apple-system, sans-serif;
        padding: 24px;
        line-height: 1.4;
      }

      x-typography[variant="overline"] {
        display: block;
        margin: 32px 0 10px;
      }

      .stack {
        display: flex;
        flex-direction: column;
        gap: 10px;
        max-width: 640px;
      }

      .row {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
        margin: 12px 0;
      }

      .row label {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
      }

      .row x-form-field { display: inline-block; }

      .log-card { margin-top: 24px; max-width: 640px; }

      .log {
        margin: 0;
        min-height: 72px;
        white-space: pre-wrap;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
      }
    </style>
  <link rel="stylesheet" href="demo-responsive.css" />
    <script src="../js/main.js"></script>
    <script src="demo-theme.js" defer></script>
  </head>
  <body>
    <x-typography variant="h1">x-alert demo</x-typography>

    <x-typography variant="overline">Variants</x-typography>
    <div class="stack">
      <x-alert type="info"    text="Your session will expire in 5 minutes."></x-alert>
      <x-alert type="success" text="Changes saved successfully."></x-alert>
      <x-alert type="warning" text="Low disk space — consider cleaning up old files."></x-alert>
      <x-alert type="error"   text="Failed to connect. Please check your network."></x-alert>
    </div>

    <x-typography variant="overline">Non-dismissible</x-typography>
    <div class="stack">
      <x-alert type="warning" text="You are in read-only mode." dismissible="false"></x-alert>
    </div>

    <x-typography variant="overline">Disabled</x-typography>
    <div class="stack">
      <x-alert type="error" text="System maintenance in progress." disabled></x-alert>
    </div>

    <x-typography variant="overline">Custom icon (attribute)</x-typography>
    <div class="stack">
      <x-alert type="info" icon="★" text="New features are available in this release."></x-alert>
    </div>

    <x-typography variant="overline">Icon hidden</x-typography>
    <div class="stack">
      <x-alert type="success" icon="none" text="Minimal alert — no icon shown."></x-alert>
    </div>

    <x-typography variant="overline">Auto-dismiss (3 s)</x-typography>
    <div class="stack" id="auto-zone">
      <x-alert id="auto-alert" type="success"
               text="This alert dismisses automatically in 3 seconds."
               timeout-ms="3000"></x-alert>
    </div>
    <div class="row">
      <x-button id="reset-btn" variant="primary">Reset</x-button>
    </div>

    <x-typography variant="overline">Spawn alert</x-typography>
    <div class="row">
      <label>type
        <x-select id="ctrl-type" value="info">
          <option value="info">info</option>
          <option value="success">success</option>
          <option value="warning">warning</option>
          <option value="error">error</option>
        </x-select>
      </label>
      <label>text
        <x-form-field id="ctrl-text" type="text" value="Alert message here"></x-form-field>
      </label>
      <label>icon
        <x-form-field id="ctrl-icon" type="text" placeholder="glyph or 'none'"></x-form-field>
      </label>
      <label>dismissible
        <x-select id="ctrl-dismissible" value="">
          <option value="">true</option>
          <option value="false">false</option>
        </x-select>
      </label>
      <label>timeout-ms
        <x-form-field id="ctrl-timeout" type="number" placeholder="none"></x-form-field>
      </label>
      <x-button id="spawn-btn" variant="primary">Spawn</x-button>
    </div>
    <div class="stack" id="live-zone"></div>

    <x-card class="log-card" variant="filled" padding="md">
      <pre class="log" id="log">Event log will appear here.</pre>
    </x-card>

    <script>
      const log = document.getElementById("log");

      function logEvent(e) {
        const d = e.detail;
        log.textContent =
          `x-alert-dismiss  type=${d.type}  reason=${d.reason}  text="${d.text}"\n` +
          log.textContent;
      }

      function watch(el) {
        el.addEventListener("x-alert-dismiss", logEvent);
      }

      document.querySelectorAll("x-alert").forEach(watch);

      // Echo x-select changes back onto the value attribute so that
      // reading `.value` later returns the user's current selection.
      document.querySelectorAll("x-select").forEach(sel => {
        sel.addEventListener("select-change", e => {
          sel.setAttribute("value", e.detail.value);
        });
      });

      document.getElementById("reset-btn").addEventListener("press", () => {
        const zone = document.getElementById("auto-zone");
        const old  = document.getElementById("auto-alert");
        if (old) old.remove();
        const el = document.createElement("x-alert");
        el.id = "auto-alert";
        el.setAttribute("type", "success");
        el.setAttribute("text", "This alert dismisses automatically in 3 seconds.");
        el.setAttribute("timeout-ms", "3000");
        watch(el);
        zone.appendChild(el);
      });

      document.getElementById("spawn-btn").addEventListener("press", () => {
        const type = document.getElementById("ctrl-type").value;
        const text = document.getElementById("ctrl-text").value || "Alert message";
        const icon = document.getElementById("ctrl-icon").value.trim();
        const dis  = document.getElementById("ctrl-dismissible").value;
        const tms  = document.getElementById("ctrl-timeout").value.trim();

        const el = document.createElement("x-alert");
        el.setAttribute("type", type);
        el.setAttribute("text", text);
        if (icon) el.setAttribute("icon", icon);
        if (dis)  el.setAttribute("dismissible", dis);
        if (tms)  el.setAttribute("timeout-ms", tms);

        watch(el);
        document.getElementById("live-zone").prepend(el);
      });
    </script>
  </body>
</html>
