<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />
  <title>Web Components — Demo Library</title>
  <script src="js/main.js"></script>
  <style>
    :root {
      color-scheme: light dark;
      --page-bg: #f8fafc;
      --page-fg: #0f172a;
      --muted: #64748b;
      --surface-bg: #ffffff;
      --surface-border: #e2e8f0;
      --surface-hover: #f1f5f9;
      --accent: #4f46e5;
      --accent-hover: #4338ca;
      --accent-subtle: #eef2ff;
      --accent-fg: #4f46e5;
      --tag-bg: #f1f5f9;
      --tag-fg: #475569;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.04);
      --style-bg: #f3e8ff;
      --style-fg: #7c3aed;
      --style-accent: #7c3aed;
      --style-subtle: #f3e8ff;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --page-bg: #0f172a;
        --page-fg: #f1f5f9;
        --muted: #94a3b8;
        --surface-bg: #1e293b;
        --surface-border: #334155;
        --surface-hover: #273549;
        --accent: #818cf8;
        --accent-hover: #a5b4fc;
        --accent-subtle: #1e1b4b;
        --accent-fg: #818cf8;
        --tag-bg: #1e293b;
        --tag-fg: #94a3b8;
        --shadow-sm: 0 1px 3px rgba(0,0,0,.3), 0 1px 2px rgba(0,0,0,.2);
        --shadow-md: 0 4px 12px rgba(0,0,0,.4), 0 2px 4px rgba(0,0,0,.2);
        --style-bg: #2e1065;
        --style-fg: #c4b5fd;
        --style-accent: #a78bfa;
        --style-subtle: #2e1065;
      }
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      background: var(--page-bg);
      color: var(--page-fg);
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      line-height: 1.5;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────────────────── */
    header {
      padding: 48px 32px 40px;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
      flex-shrink: 0;
    }

    .header-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent-fg);
      background: var(--accent-subtle);
      padding: 3px 10px;
      border-radius: 20px;
    }

    header h1 {
      margin: 0 0 10px;
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: var(--page-fg);
    }

    header p {
      margin: 0 0 24px;
      font-size: 1.0625rem;
      color: var(--muted);
      max-width: 560px;
    }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 20px;
      font-size: 0.8125rem;
      color: var(--muted);
      flex-wrap: wrap;
    }

    .header-meta span {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    /* ── Toolbar ─────────────────────────────────────────── */
    .toolbar {
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
      padding: 0 32px 28px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
      max-width: 340px;
    }

    .search-icon {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      width: 15px;
      height: 15px;
      fill: var(--muted);
      pointer-events: none;
    }

    #search {
      width: 100%;
      padding: 8px 12px 8px 34px;
      border: 1px solid var(--surface-border);
      border-radius: 8px;
      font-size: 0.875rem;
      background: var(--surface-bg);
      color: var(--page-fg);
      outline: none;
      transition: border-color .15s;
    }

    #search:focus { border-color: var(--accent); }

    .filter-chips {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .filter-chip {
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--surface-border);
      background: var(--surface-bg);
      color: var(--muted);
      transition: background .12s, color .12s, border-color .12s;
      user-select: none;
    }

    .filter-chip:hover {
      background: var(--surface-hover);
      color: var(--page-fg);
    }

    .filter-chip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    @media (prefers-color-scheme: dark) {
      .filter-chip.active { color: #0f172a; }
    }

    .style-chip {
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--surface-border);
      background: var(--surface-bg);
      color: var(--muted);
      transition: background .12s, color .12s, border-color .12s;
      user-select: none;
    }

    .style-chip:hover {
      background: var(--style-subtle);
      color: var(--style-fg);
    }

    .style-chip.active {
      background: var(--style-accent);
      border-color: var(--style-accent);
      color: #fff;
    }

    @media (prefers-color-scheme: dark) {
      .style-chip.active { color: #0f172a; }
    }

    /* ── Section label ───────────────────────────────────── */
    .section-label {
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
      padding: 0 32px 12px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--muted);
      flex-shrink: 0;
    }

    /* ── Grid ────────────────────────────────────────────── */
    .grid {
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
      padding: 0 32px 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 14px;
      align-content: start;
      flex: 1;
    }

    /* ── Component card ──────────────────────────────────── */
    .comp-card {
      display: flex;
      flex-direction: column;
      background: var(--surface-bg);
      border: 1px solid var(--surface-border);
      border-radius: 12px;
      padding: 18px 20px 16px;
      text-decoration: none;
      color: inherit;
      box-shadow: var(--shadow-sm);
      transition: box-shadow .15s, border-color .15s, transform .12s;
    }

    .comp-card:hover {
      box-shadow: var(--shadow-md);
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .comp-card:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .comp-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--accent-subtle);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
    }

    .comp-icon svg {
      width: 18px;
      height: 18px;
      fill: var(--accent-fg);
    }

    .comp-name {
      font-size: 0.9375rem;
      font-weight: 600;
      margin-bottom: 4px;
      letter-spacing: -0.01em;
    }

    .comp-tag {
      font-size: 0.75rem;
      color: var(--muted);
      font-family: ui-monospace, monospace;
      margin-bottom: 10px;
    }

    .comp-tags {
      margin-top: auto;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .comp-category {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.6875rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      background: var(--tag-bg);
      color: var(--tag-fg);
    }

    .comp-style {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.6875rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      background: var(--style-subtle);
      color: var(--style-fg);
    }

    /* ── Empty state ─────────────────────────────────────── */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 0;
      color: var(--muted);
      font-size: 0.9375rem;
    }

    /* ── Footer ──────────────────────────────────────────── */
    footer {
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
      padding: 24px 32px;
      border-top: 1px solid var(--surface-border);
      font-size: 0.8125rem;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      flex-shrink: 0;
    }

    @media (max-width: 768px) {
      header { padding: 32px 20px 28px; }
      .toolbar { padding: 0 20px 20px; }
      .section-label { padding: 0 20px 10px; }
      .grid { padding: 0 20px 20px; grid-template-columns: 1fr 1fr; gap: 10px; }
      footer { padding: 20px; }
      .search-wrap { min-width: 0; max-width: none; flex: 1 1 100%; }
    }

    @media (max-width: 480px) {
      header { padding: 20px 12px 16px; }
      header h1 { font-size: 1.5rem; }
      header p { font-size: 0.9rem; }
      .toolbar { padding: 0 12px 14px; }
      .section-label { padding: 0 12px 8px; }
      .grid { padding: 0 12px 14px; grid-template-columns: 1fr; gap: 8px; }
      footer { padding: 14px 12px; flex-direction: column; text-align: center; gap: 8px; }
      .comp-card { padding: 12px 14px 10px; }
      .filter-chip { padding: 4px 8px; font-size: 0.75rem; }
      .comp-style { font-size: 0.6rem; padding: 2px 6px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .comp-card { transition: none; }
    }
  </style>
</head>

<div class="grid" id="grid"></div>

    { name: "Timeline",            tag: "x-timeline",            file: "x-timeline",            cat: "data"                         },
    { name: "Timeline Item",       tag: "x-timeline-item",       file: "x-timeline-item",       cat: "data"                         },
    { name: "Toast",               tag: "x-toast",               file: "x-toast",               cat: "feedback"                     },
    { name: "Toaster",             tag: "x-toaster",             file: "x-toaster",             cat: "feedback"                     },
    { name: "Tooltip",             tag: "x-tooltip",             file: "x-tooltip",             cat: "overlay"                      },
    { name: "Welcome Tour",        tag: "x-welcome-tour",        file: "x-welcome-tour",        cat: "overlay"                      },
    { name: "Theme",               tag: "x-theme",               file: "x-theme",               cat: "layout"                       },
    { name: "Typography",          tag: "x-typography",          file: "x-typography",          cat: "layout"                       },
  ];

  const catIcons = {
    form:       `<svg viewBox="0 0 16 16"><rect x="1" y="2" width="14" height="3" rx="1"/><rect x="1" y="7" width="9" height="2" rx="1"/><rect x="1" y="11" width="11" height="2" rx="1"/></svg>`,
    feedback:   `<svg viewBox="0 0 16 16"><path d="M8 1a7 7 0 1 0 0 14A7 7 0 0 0 8 1zm0 3a1 1 0 1 1 0 2 1 1 0 0 1 0-2zm0 3.5c.276 0 .5.224.5.5v4a.5.5 0 0 1-1 0V8c0-.276.224-.5.5-.5z"/></svg>`,
    navigation: `<svg viewBox="0 0 16 16"><rect x="1" y="2" width="14" height="2" rx="1"/><rect x="1" y="7" width="10" height="2" rx="1"/><rect x="1" y="12" width="12" height="2" rx="1"/></svg>`,
    layout:     `<svg viewBox="0 0 16 16"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>`,
    data:       `<svg viewBox="0 0 16 16"><ellipse cx="8" cy="4" rx="6" ry="2"/><path d="M2 4v3c0 1.105 2.686 2 6 2s6-.895 6-2V4"/><path d="M2 7v4c0 1.105 2.686 2 6 2s6-.895 6-2V7"/></svg>`,
    overlay:    `<svg viewBox="0 0 16 16"><rect x="1" y="1" width="9" height="9" rx="1" opacity=".4"/><rect x="6" y="6" width="9" height="9" rx="1"/></svg>`,
  };

  let activeCategory = "all";
  let activeStyle = "all";
  let activeTheme = "";
  let searchQuery = "";

  // Auto-generate style chips from data
  const styles = [...new Set(components.filter(c => c.style).map(c => c.style))].sort();
  const styleChipsEl = document.getElementById("style-chips");
  styleChipsEl.innerHTML =
    `<button class="style-chip active" data-style="all">All styles</button>` +
    styles.map(s => `<button class="style-chip" data-style="${s}">${s.charAt(0).toUpperCase() + s.slice(1)}</button>`).join("");

  function render() {
    const filtered = components.filter(c => {
      const matchesCat = activeCategory === "all" || c.cat === activeCategory;
      const matchesStyle = activeStyle === "all" || c.style === activeStyle;
      const q = searchQuery.toLowerCase();
      const matchesSearch = !q || c.name.toLowerCase().includes(q) || c.tag.includes(q) || c.cat.includes(q) || (c.style && c.style.includes(q));
      return matchesCat && matchesStyle && matchesSearch;
    });

    document.getElementById("count-label").textContent = `${components.length} components`;

    const label = document.getElementById("section-label");
    if (searchQuery) {
      label.textContent = `${filtered.length} result${filtered.length !== 1 ? "s" : ""} for "${searchQuery}"`;
    } else if (activeCategory === "all") {
      label.textContent = "All components";
    } else {
      label.textContent = activeCategory.charAt(0).toUpperCase() + activeCategory.slice(1);
    }

    const grid = document.getElementById("grid");

    if (!filtered.length) {
      grid.innerHTML = `<div class="empty">No components match your filter.</div>`;
      return;
    }

    grid.innerHTML = filtered.map(c => `
      <a class="comp-card" href="demo/${c.file}.html${activeTheme ? '?theme=' + activeTheme : ''}" target="_blank" rel="noopener">
        <div class="comp-icon">${catIcons[c.cat]}</div>
        <div class="comp-name">${c.name}</div>
        <div class="comp-tag">&lt;${c.tag}&gt;</div>
        <div class="comp-tags">
          <span class="comp-category">${c.cat}</span>
          ${c.style ? `<span class="comp-style">${c.style}</span>` : ""}
        </div>
      </a>
    `).join("");
  }

  document.getElementById("filter-chips").addEventListener("click", e => {
    const chip = e.target.closest(".filter-chip");
    if (!chip) return;
    activeCategory = chip.dataset.cat;
    document.querySelectorAll(".filter-chip").forEach(el =>
      el.classList.toggle("active", el === chip));
    render();
  });

  document.getElementById("style-chips").addEventListener("click", e => {
    const chip = e.target.closest(".style-chip");
    if (!chip) return;
    activeStyle = chip.dataset.style;
    document.querySelectorAll(".style-chip").forEach(el =>
      el.classList.toggle("active", el === chip));
    render();
  });

  // Token-to-page-variable mapping for x-theme integration
  const tokenMap = [
    ["--x-color-bg",             ["--page-bg"]],
    ["--x-color-text",           ["--page-fg"]],
    ["--x-color-text-muted",     ["--muted", "--tag-fg"]],
    ["--x-color-surface",        ["--surface-bg", "--tag-bg"]],
    ["--x-color-border",         ["--surface-border"]],
    ["--x-color-surface-hover",  ["--surface-hover"]],
    ["--x-color-primary",        ["--accent", "--accent-fg"]],
    ["--x-color-primary-hover",  ["--accent-hover"]],
    ["--x-color-surface-active", ["--accent-subtle"]],
    ["--x-shadow-sm",            ["--shadow-sm"]],
    ["--x-shadow-md",            ["--shadow-md"]],
  ];

  function applyThemeToPage(themeEl, active) {
    const root = document.documentElement.style;
    if (!active) {
      tokenMap.forEach(([, pageVars]) =>
        pageVars.forEach(v => root.removeProperty(v)));
      return;
    }
    // Wait one frame for x-theme shadow style to update, then read
    // computed tokens from a slotted child and apply to :root.
    requestAnimationFrame(() => {
      const probe = themeEl.querySelector("header") || themeEl;
      const cs = getComputedStyle(probe);
      tokenMap.forEach(([token, pageVars]) => {
        const val = cs.getPropertyValue(token).trim();
        if (val) pageVars.forEach(v => root.setProperty(v, val));
      });
    });
  }

  document.getElementById("theme-chips").addEventListener("click", e => {
    const chip = e.target.closest(".filter-chip");
    if (!chip) return;
    activeTheme = chip.dataset.theme;
    const themeEl = document.getElementById("page-theme");
    if (activeTheme) {
      themeEl.setAttribute("preset", activeTheme);
    } else {
      themeEl.removeAttribute("preset");
    }
    document.querySelectorAll("#theme-chips .filter-chip").forEach(el =>
      el.classList.toggle("active", el === chip));
    applyThemeToPage(themeEl, !!activeTheme);
    render();
  });

  document.getElementById("search").addEventListener("input", e => {
    searchQuery = e.target.value.trim();
    if (searchQuery) {
      activeCategory = "all";
      activeStyle = "all";
      document.querySelectorAll(".filter-chip").forEach(el =>
        el.classList.toggle("active", el.dataset.cat === "all"));
      document.querySelectorAll(".style-chip").forEach(el =>
        el.classList.toggle("active", el.dataset.style === "all"));
    }
    render();
  });

  render();
</script>

</x-theme>

</body>
</html>
