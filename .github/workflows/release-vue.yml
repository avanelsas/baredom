name: release-vue

on:
  push:
    tags:
      - 'vue-v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Vue Adapter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - uses: DeLaGuardo/setup-clojure@13
        with:
          cli: 'latest'

      - name: Setup Babashka
        run: |
          curl -sLO https://raw.githubusercontent.com/babashka/babashka/master/install
          chmod +x install
          sudo ./install --dir /usr/local/bin
          bb --version

      - run: npm ci

      - name: Build core library
        run: npm run build

      - name: Derive version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#vue-v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Verify version matches package.json
        run: |
          PKG_VERSION=$(node -p "require('./adapters/vue/package.json').version")
          if [ "$PKG_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "Tag version (${{ steps.version.outputs.version }}) does not match package.json ($PKG_VERSION)"
            exit 1
          fi

      - name: Generate Vue wrappers
        run: bb scripts/generate_vue.bb

      - name: Check generated files are up to date
        run: git diff --exit-code adapters/vue/src/ adapters/vue/package.json

      - name: Install adapter dependencies
        run: cd adapters/vue && npm install

      - name: Build adapter
        run: cd adapters/vue && npx tsc

      - name: Publish to npm
        run: |
          npm config set //registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}
          npm publish --workspace adapters/vue --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "@vanelsas/baredom-vue v${{ steps.version.outputs.version }}"
          body: |
            Vue 3 adapter for BareDOM web components.

            ```bash
            npm install @vanelsas/baredom-vue
            ```
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
