name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - uses: DeLaGuardo/setup-clojure@13
        with:
          cli: 'latest'

      - run: npm ci

      - name: Setup clj-kondo
        run: |
          curl -sLO https://raw.githubusercontent.com/clj-kondo/clj-kondo/master/script/install-clj-kondo
          chmod +x install-clj-kondo
          sudo ./install-clj-kondo --dir /usr/local/bin --version 2026.01.19
          clj-kondo --version

      - name: Setup Babashka
        run: |
          curl -sLO https://raw.githubusercontent.com/babashka/babashka/master/install
          chmod +x install
          sudo ./install --dir /usr/local/bin
          bb --version

      - name: Lint with clj-kondo
        run: clj-kondo --lint src test --config '{:output {:pattern "::warning file={{filename}},line={{row}},col={{col}}::{{message}}"}}'

      - name: Check method-api drift
        run: bb scripts/check_method_api.bb

      - name: Check :require indent drift
        run: bb scripts/check_require_style.bb

      - name: Check du discipline (no gobj on host, no make-el shim)
        run: bb scripts/check_du_discipline.bb

      - name: Check barebuild boundary (BareDOM <-> BareBuild)
        run: bb scripts/check-barebuild-boundary.bb

      - name: Build ESM library
        run: npm run build

      - name: Check bundle sizes
        run: bash scripts/check-bundle-size.sh

      - name: Build React adapter
        run: |
          bb scripts/generate_react.bb
          cd adapters/react && npm install && npx tsc

      - name: Build React adapter test app
        run: cd adapters/react/test-app && npm install && npx vite build

      - name: Check React adapter is up to date
        run: |
          bb scripts/generate_react.bb
          git diff --exit-code adapters/react/src/ adapters/react/package.json || (echo "React adapter is out of date. Run: bb scripts/generate_react.bb" && exit 1)

      - name: Build Angular adapter
        run: |
          bb scripts/generate_angular.bb
          cd adapters/angular && npm install && npx ngc

      - name: Build Angular adapter test app
        run: cd adapters/angular/test-app && npm install && npx ng build

      - name: Check Angular adapter is up to date
        run: |
          bb scripts/generate_angular.bb
          git diff --exit-code adapters/angular/src/ adapters/angular/package.json || (echo "Angular adapter is out of date. Run: bb scripts/generate_angular.bb" && exit 1)

      - name: Build Vue adapter
        run: |
          bb scripts/generate_vue.bb
          cd adapters/vue && npm install && npx tsc

      - name: Build Vue adapter test app
        run: cd adapters/vue/test-app && npm install && npm run build

      - name: Check Vue adapter is up to date
        run: |
          bb scripts/generate_vue.bb
          git diff --exit-code adapters/vue/src/ adapters/vue/package.json || (echo "Vue adapter is out of date. Run: bb scripts/generate_vue.bb" && exit 1)

      - name: Build Svelte adapter
        run: |
          bb scripts/generate_svelte.bb
          cd adapters/svelte && npm install && npx svelte-check --tsconfig ./tsconfig.json --fail-on-warnings && npx svelte-package -i src -o dist

      - name: Build Svelte adapter test app
        run: cd adapters/svelte/test-app && npm install && npm run build

      - name: Check Svelte adapter is up to date
        run: |
          bb scripts/generate_svelte.bb
          git diff --exit-code adapters/svelte/src/ adapters/svelte/package.json || (echo "Svelte adapter is out of date. Run: bb scripts/generate_svelte.bb" && exit 1)

      - name: Run tests
        run: npm test
        env:
          CHROMIUM_FLAGS: "--no-sandbox"
